<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KOTC LEADERBOARD</title>
    <style>
      * {
        box-sizing: border-box;
      }

      .bg-slideshow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }

      .bg-slideshow img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        animation: fade 20s infinite;
      }

      .bg-slideshow img:nth-child(1) {
        animation-delay: 0s;
      }
      .bg-slideshow img:nth-child(2) {
        animation-delay: 5s;
      }
      .bg-slideshow img:nth-child(3) {
        animation-delay: 10s;
      }
      .bg-slideshow img:nth-child(4) {
        animation-delay: 15s;
      }

      @keyframes fade {
        0%,
        25% {
          opacity: 0;
        }
        30%,
        95% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
        background: rgba(0, 0, 0, 0.7);
        padding: 20px;
        border-radius: 10px;
      }

      h1 {
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-align: center;
        font-size: 2em;
        color: #fff;
        margin: 0 0 20px 0;
      }

      .entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        margin: 10px 0;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }

      .entry-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .avatar {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid #333;
      }

      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .name {
        font-size: 1.1em;
        font-weight: bold;
      }

      .score {
        font-size: 1.3em;
        color: #2196f3;
        font-weight: bold;
      }

      .controls {
        text-align: center;
        margin-top: 25px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 8px;
      }

      .controls h3 {
        margin: 0 0 10px 0;
      }

      input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1em;
      }

      input:focus {
        outline: none;
        border-color: #2196f3;
      }

      button {
        padding: 10px 18px;
        font-size: 1em;
        cursor: pointer;
        background: #2196f3;
        color: white;
        border: none;
        border-radius: 4px;
      }

      button:hover {
        background: #1976d2;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 8px;
        text-align: center;
        min-width: 300px;
      }

      .modal-content h3 {
        margin: 0 0 15px 0;
      }

      .modal-content input {
        width: 100%;
        margin-bottom: 15px;
      }

      .modal-content button {
        margin: 0 5px;
      }

      .btn-cancel {
        background: #9e9e9e;
      }

      .btn-cancel:hover {
        background: #757575;
      }
    </style>
  </head>
  <body>
    <div class="bg-slideshow">
      <img src="goku.png" alt="" />
      <img src="cftm.jpg" alt="" />
      <img src="sybau.jpg" alt="" />
      <img src="YODA.png" alt="" />
    </div>

    <div class="container">
      <h1><span>👑🏀</span><span>KOTC</span><span>🍀🧱</span></h1>
      <div id="entries"></div>
      <div class="controls">
        <h3>Nuevo Sayajin</h3>
        <input
          type="text"
          id="newNameInput"
          placeholder="Nombre del guerrero"
          onkeydown="if (event.key === 'Enter') addName();"
        />
        <button onclick="addName()">Agregar</button>
      </div>
    </div>

    <div
      id="modal"
      class="modal"
      onclick="if (event.target.id === 'modal') closeModal();"
    >
      <div class="modal-content">
        <h3 id="modalTitle">Contraseña</h3>
        <input
          type="password"
          id="modalPassword"
          placeholder="Contraseña"
          onkeydown="if (event.key === 'Enter') confirmModal();"
        />
        <button onclick="confirmModal()">Aceptar</button>
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      </div>
    </div>

    <script>
      const API_URL = "/api";
      const PASSWORD = "pepito123";
      const IMGS = ["goku.png", "cftm.jpg", "sybau.jpg", "YODA.png"];

      function getImg(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
          hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        return IMGS[Math.abs(hash) % IMGS.length];
      }

      async function fetchData() {
        const res = await fetch(API_URL + "/data");
        return await res.json();
      }

      async function render() {
        const div = document.getElementById("entries");
        div.innerHTML = '<div style="text-align:center;padding:20px;">🏀 Cargando...</div>';
        
        const data = await fetchData();
        const entries = data.names
          .map((n) => ({ name: n, score: data.scores[n] || 0 }))
          .sort((a, b) => b.score - a.score);

        const div = document.getElementById("entries");
        div.innerHTML = entries
          .map(
            (e, i) => `
              <div class="entry">
                <div class="entry-left">
                  <div class="avatar"><img src="${getImg(e.name)}" alt="${e.name}"></div>
                  <span class="name">${i + 1}. ${e.name}</span>
                </div>
                <span class="score">${e.score}</span>
                <button onclick="incrementPrompt('${e.name}')">+1</button>
              </div>`,
          )
          .join("");
      }

      let pendingMode = "";

      function openModal(mode, name) {
        pendingMode = mode;
        document.getElementById("modalTitle").textContent =
          mode === "incrementar"
            ? `Contraseña para ${name}`
            : "Contraseña para agregar";
        document.getElementById("modalPassword").value = "";
        document.getElementById("modal").classList.add("active");
        document.getElementById("modalPassword").focus();
      }

      function closeModal() {
        document.getElementById("modal").classList.remove("active");
        pendingMode = "";
      }

      async function confirmModal() {
        const password = document.getElementById("modalPassword").value;
        if (password !== PASSWORD) {
          alert("Contraseña incorrecta");
          return;
        }

        if (pendingMode === "incrementar") {
          const btn = event.target;
          btn.disabled = true;
          btn.textContent = "🏀...";
          
          const res = await fetch(API_URL + "/increment", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: window.pendingName, password: PASSWORD }),
          });
          const result = await res.json();
          if (result.error) {
            alert(result.error);
            return;
          }
          render();
        } else if (pendingMode === "agregar") {
          const name = document.getElementById("newNameInput").value.trim();
          if (!name) {
            alert("Ingresa un nombre");
            return;
          }
          const res = await fetch(API_URL + "/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name }),
          });
          const result = await res.json();
          if (result.error) {
            alert(result.error);
            return;
          }
          document.getElementById("newNameInput").value = "";
          render();
        }

        closeModal();
      }

      function incrementPrompt(name) {
        window.pendingName = name;
        openModal("incrementar", name);
      }

      function addName() {
        const name = document.getElementById("newNameInput").value.trim();
        if (!name) {
          alert("Ingresa un nombre");
          return;
        }
        
        const btn = event.target;
        btn.disabled = true;
        btn.textContent = "🏀...";
        
        fetch(API_URL + "/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name }),
        })
        .then((res) => res.json())
        .then((result) => {
          btn.disabled = false;
          btn.textContent = "Agregar";
          if (result.error) {
            alert(result.error);
            return;
          }
          document.getElementById("newNameInput").value = "";
          render();
        });
      }

      render();
    </script>
  </body>
</html>
